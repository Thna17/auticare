name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: auticare
          MYSQL_USER: auticare
          MYSQL_PASSWORD: auticare_dev_password
          MYSQL_ROOT_PASSWORD: auticare_root_dev_password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
        env:
          DATABASE_URL: mysql://auticare:auticare_dev_password@127.0.0.1:3306/auticare
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: mysql://auticare:auticare_dev_password@127.0.0.1:3306/auticare
          APP_ORIGIN: http://localhost:4200
          API_ORIGIN: http://localhost:3000
          JWT_ACCESS_SECRET: test-access-secret-with-at-least-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-with-at-least-32-characters
      - run: pnpm build
